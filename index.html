<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI Notes Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f7fb;
      color: #222;
    }

    h1 {
      color: #1f2937;
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      margin-top: 16px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .result {
      margin-top: 24px;
      padding: 20px;
      background: white;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }

    .section {
      margin-bottom: 20px;
    }

    h2 {
      margin-bottom: 8px;
      color: #111827;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <h1>AI Notes Assistant</h1>
  <p>Paste your notes below. This assistant will organize them into a summary, keywords, and action items.</p>

  <textarea id="notes" placeholder="Paste your notes here..."></textarea>
  <br>
  <button onclick="analyzeNotes()">Analyze Notes</button>

  <div class="result">
    <div class="section">
      <h2>Summary</h2>
      <p id="summary">Your summary will appear here.</p>
    </div>

    <div class="section">
      <h2>Keywords</h2>
      <p id="keywords">Keywords will appear here.</p>
    </div>

    <div class="section">
      <h2>Action Items</h2>
      <ul id="actions">
        <li>Action items will appear here.</li>
      </ul>
    </div>
  </div>

  <script>
    function analyzeNotes() {
      const notes = document.getElementById("notes").value.trim();
      const summary = document.getElementById("summary");
      const keywords = document.getElementById("keywords");
      const actions = document.getElementById("actions");

      if (!notes) {
        summary.textContent = "Please enter some notes first.";
        keywords.textContent = "No keywords yet.";
        actions.innerHTML = "<li>No action items yet.</li>";
        return;
      }

      const sentences = notes.split(/[.!?。！？]/).filter(Boolean);
      const words = notes
        .toLowerCase()
        .replace(/[^\w\s]/g, "")
        .split(/\s+/)
        .filter(word => word.length > 4);

      const uniqueWords = [...new Set(words)];
      const topKeywords = uniqueWords.slice(0, 5);

      summary.textContent = "Main idea: " + sentences[0].trim();

      keywords.textContent = topKeywords.length > 0
        ? topKeywords.join(", ")
        : "No clear keywords found.";

      actions.innerHTML = "";

      const actionWords = ["need", "should", "must", "todo", "plan", "next", "要", "需要", "应该", "计划"];
      const actionSentences = sentences.filter(sentence =>
        actionWords.some(word => sentence.toLowerCase().includes(word))
      );

      if (actionSentences.length === 0) {
        actions.innerHTML = "<li>No obvious action items found.</li>";
      } else {
        actionSentences.forEach(sentence => {
          const li = document.createElement("li");
          li.textContent = sentence.trim();
          actions.appendChild(li);
        });
      }
    }
  </script>
</body>
</html>
