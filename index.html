<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI Notes Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f7fb;
      color: #222;
    }

    h1 {
      color: #1f2937;
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      margin-top: 16px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .result {
      margin-top: 24px;
      padding: 20px;
      background: white;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <h1>AI Notes Assistant</h1>
  <p>Paste your notes below. This simple assistant will organize them into a short summary.</p>

  <textarea id="notes" placeholder="Paste your notes here..."></textarea>
  <br>
  <button onclick="summarizeNotes()">Summarize</button>

  <div class="result">
    <h2>Summary</h2>
    <p id="summary">Your summary will appear here.</p>
  </div>

  <script>
    function summarizeNotes() {
      const notes = document.getElementById("notes").value.trim();
      const summary = document.getElementById("summary");

      if (!notes) {
        summary.textContent = "Please enter some notes first.";
        return;
      }

      const sentences = notes.split(/[.!?。！？]/).filter(Boolean);
      const firstSentence = sentences[0] || notes;

      summary.textContent = "Main idea: " + firstSentence.trim();
    }
  </script>
</body>
</html>
